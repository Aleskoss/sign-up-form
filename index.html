<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles/style.css" />
    <script src="scripts/script.js" defer></script>
  </head>
  <body>
    <div class="logo-section">
      <div>
        <p class="logo">
          <img src="./images/odin-lined.png" alt="Logo" />
          odin
        </p>
        <p class="credit">
          Photo by
          <a href="https://pixabay.com/cs/users/nikolasv-9655594/">NikolasV</a>
          on
          <a href="https://pixabay.com/cs/users/nikolasv-9655594/">Pixabay</a>
        </p>
      </div>
    </div>
    <div class="form-section">
      <p>
        This is not a real online service! You know you need something like this
        in your life to help you realize your deepest dreams. Sign up now to get
        started.
      </p>
      <p>You know you want to.</p>
      <form>
        <div class="main-container">
          <h1>Let's do this</h1>
          <div class="main-form">
            <section class="form-side-left">
              <div>
                <label for="firs-name">First Name</label>
                <input type="text" id="firs-name" />
              </div>
              <div>
                <label for="email">Email</label>
                <input type="email" id="email" />
              </div>
              <div>
                <label for="pwd">password</label>
                <input
                  type="password"
                  id="pwd"
                  pattern="(?=.*[0-9])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}"
                />
                <span></span>
              </div>
            </section>
            <section class="form-side-right">
              <div>
                <label for="last-name">Last name</label>
                <input type="text" id="last-name" />
              </div>
              <div>
                <label for="phone-number">Phone Number</label>
                <input type="tel" id="phone-number" />
              </div>
              <div>
                <label for="pwd-confirm">Confirm password</label>
                <input
                  type="password"
                  id="pwd-confirm"
                  pattern="(?=.*[0-9])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}"
                />
                <span></span>
              </div>
            </section>
          </div>
        </div>
        <section class="button-section">
          <button type="submit">Create Account</button>
        </section>
      </form>
      <p>Already have an account? <a href="#">Log in</a></p>
    </div>
  </body>
</html>
